services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: polymath
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - polymath_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d polymath"]
      interval: 5s
      timeout: 5s
      retries: 10

  graph:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/polymath-dev
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - polymath_neo4j_data:/data
      - polymath_neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      POSTGRES_URL: postgres://postgres:postgres@db:5432/polymath
      NEO4J_URI: bolt://graph:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: polymath-dev
      MOCK_MODEL: "true"
      OPENAI_MODEL: gpt-5.2
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      graph:
        condition: service_healthy

volumes:
  polymath_pg:
  polymath_neo4j_data:
  polymath_neo4j_logs:
